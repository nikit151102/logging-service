version: '3.8'

services:
  logging-service:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - /home/user/backups/infrastructure/logging:/app/logs
    environment:
      - LOG_LEVEL=INFO
    restart: unless-stopped
    networks:
      - database_authhub
      - common

networks:
  common:
    external: true